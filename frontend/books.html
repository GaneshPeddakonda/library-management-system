<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Books – Library Management System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo">📚 <span>Library MS</span></div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="books.html">Books</a>
      <a href="members.html">Members</a>
      <a href="issue-book.html">Issue/Return</a>
      <a href="fines.html">Fines</a>
      <a href="reports.html">Reports</a>
    </nav>
    <div style="color:#fff;font-size:.85rem">👤 <span id="user-name"></span> &nbsp;
      <a href="#" onclick="logout()" style="color:rgba(255,255,255,.7);font-size:.8rem">Logout</a>
    </div>
  </header>

  <main class="container">
    <div class="page-header">
      <h1 class="page-title">Books</h1>
      <button class="btn btn-primary" onclick="openAdd()">+ Add Book</button>
    </div>
    <div id="alert-area"></div>
    <div class="card">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search title, author or ISBN…">
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr><th>#</th><th>Title</th><th>Author</th><th>Category</th><th>ISBN</th><th>Copies</th><th>Actions</th></tr>
          </thead>
          <tbody id="books-table"><tr><td colspan="7">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="book-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Add Book</span>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <form id="book-form">
        <div class="form-row">
          <div class="form-group">
            <label>Title *</label>
            <input type="text" id="f-title" required>
          </div>
          <div class="form-group">
            <label>Author *</label>
            <input type="text" id="f-author" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>ISBN</label>
            <input type="text" id="f-isbn">
          </div>
          <div class="form-group">
            <label>Category</label>
            <input type="text" id="f-category" placeholder="e.g. Fiction, Technology">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Publisher</label>
            <input type="text" id="f-publisher">
          </div>
          <div class="form-group">
            <label>Year</label>
            <input type="number" id="f-year" min="1000" max="2099">
          </div>
        </div>
        <div class="form-group">
          <label>Total Copies</label>
          <input type="number" id="f-copies" min="1" value="1">
        </div>
        <div style="display:flex;gap:.75rem;justify-content:flex-end;margin-top:1rem">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <footer><p>© 2026 Library Management System</p></footer>
  <script src="js/api.js"></script>
  <script src="js/books.js"></script>
</body>
</html>
