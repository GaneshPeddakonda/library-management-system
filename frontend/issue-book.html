<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue / Return – Library Management System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo">📚 <span>Library MS</span></div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="books.html">Books</a>
      <a href="members.html">Members</a>
      <a href="issue-book.html">Issue/Return</a>
      <a href="fines.html">Fines</a>
      <a href="reports.html">Reports</a>
    </nav>
    <div style="color:#fff;font-size:.85rem">👤 <span id="user-name"></span> &nbsp;
      <a href="#" onclick="logout()" style="color:rgba(255,255,255,.7);font-size:.8rem">Logout</a>
    </div>
  </header>

  <main class="container">
    <div class="page-header">
      <h1 class="page-title">Issue / Return Books</h1>
    </div>
    <div id="alert-area"></div>

    <div style="display:grid;grid-template-columns:340px 1fr;gap:1.25rem">
      <!-- Issue Form -->
      <div class="card">
        <div class="card-title">Issue a Book</div>
        <form id="issue-form">
          <div class="form-group">
            <label>Book ID</label>
            <input type="number" id="f-book_id" placeholder="Enter book ID" required min="1">
          </div>
          <div class="form-group">
            <label>Member ID</label>
            <input type="number" id="f-member_id" placeholder="Enter member ID" required min="1">
          </div>
          <p style="font-size:.8rem;color:#64748b;margin-bottom:.75rem">Loan period: 14 days. Fine: ₹2/day overdue.</p>
          <button type="submit" class="btn btn-primary" style="width:100%">Issue Book</button>
        </form>
      </div>

      <!-- Active Issues Table -->
      <div class="card">
        <div class="card-title">Active Issues</div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr><th>#</th><th>Book</th><th>Member</th><th>Issued</th><th>Due Date</th><th>Action</th></tr>
            </thead>
            <tbody id="issues-table"><tr><td colspan="6">Loading…</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <footer><p>© 2026 Library Management System</p></footer>
  <script src="js/api.js"></script>
  <script src="js/issue.js"></script>
</body>
</html>
