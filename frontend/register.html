<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – Library Management System</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div class="login-box">
    <h2>📚 Library MS</h2>
    <p class="subtitle">Create a new account</p>
    <div id="alert-area"></div>
    <form id="registerForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="full_name" placeholder="Your full name" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="email@example.com" required>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Choose a username" required minlength="3">
      </div>
      <div class="form-group">
        <label>Password</label>
        <!-- FIX: added minlength="6" so browser enforces the stated "Min 6 characters" rule -->
        <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
        <div id="reg-error" class="error-msg"></div>
      </div>
      <button type="submit" class="btn btn-primary">Register</button>
    </form>
    <div class="links">Already have an account? <a href="login.html">Login</a></div>
  </div>
  <script src="js/api.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const errEl = document.getElementById('reg-error');
      errEl.textContent = '';
      const password = document.getElementById('password').value;
      // FIX: explicit JS-side length check as a second layer of defense
      if (password.length < 6) {
        errEl.textContent = 'Password must be at least 6 characters.';
        return;
      }
      const btn = this.querySelector('button[type="submit"]');
      btn.disabled = true; btn.textContent = 'Registering…';
      const body = {
        full_name: document.getElementById('full_name').value,
        email:     document.getElementById('email').value,
        username:  document.getElementById('username').value,
        password:  password
      };
      try {
        const res = await fetch('http://localhost:5000/api/auth/register', {
          method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
        });
        const data = await res.json();
        if (data.status === 'success') {
          document.getElementById('alert-area').innerHTML = '<div class="alert alert-success">Registered! Redirecting…</div>';
          setTimeout(() => window.location.href = 'login.html', 1500);
        } else {
          errEl.textContent = data.message;
        }
      } catch { errEl.textContent = 'Server not reachable'; }
      finally { btn.disabled = false; btn.textContent = 'Register'; }
    });
  </script>
</body>
</html>
