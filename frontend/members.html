<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Members – Library Management System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo">📚 <span>Library MS</span></div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="books.html">Books</a>
      <a href="members.html">Members</a>
      <a href="issue-book.html">Issue/Return</a>
      <a href="fines.html">Fines</a>
      <a href="reports.html">Reports</a>
    </nav>
    <div style="color:#fff;font-size:.85rem">👤 <span id="user-name"></span> &nbsp;
      <a href="#" onclick="logout()" style="color:rgba(255,255,255,.7);font-size:.8rem">Logout</a>
    </div>
  </header>

  <main class="container">
    <div class="page-header">
      <h1 class="page-title">Members</h1>
      <button class="btn btn-primary" onclick="openAddMember()">+ Add Member</button>
    </div>
    <div id="alert-area"></div>
    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Status</th><th>Actions</th></tr>
          </thead>
          <tbody id="members-table"><tr><td colspan="6">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="member-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Add Member</span>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <form id="member-form">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="f-full_name" required>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="f-email" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Phone</label>
            <input type="text" id="f-phone">
          </div>
        </div>
        <div class="form-group">
          <label>Address</label>
          <textarea id="f-address" rows="2"></textarea>
        </div>
        <div style="display:flex;gap:.75rem;justify-content:flex-end;margin-top:1rem">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <footer><p>© 2026 Library Management System</p></footer>
  <script src="js/api.js"></script>
  <script src="js/members.js"></script>
</body>
</html>
